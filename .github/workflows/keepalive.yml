name: Database Keep-alive Ping

on:
  schedule:
    # Run every 48 hours to prevent Supabase Free Tier from pausing the database
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Shopinsane Homepage
        # We ping the homepage because it fetches products, which triggers a Supabase read
        run: |
          echo "Pinging https://shopinsane.pages.dev/ to wake up Supabase DB..."
          curl -f -s -S https://shopinsane.pages.dev/ > /dev/null || exit 1
          echo "Ping successful!"
