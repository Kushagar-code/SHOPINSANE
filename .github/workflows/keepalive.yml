name: Keep-alive Ping

on:
  schedule:
    # Run every 48 hours to prevent Supabase free-tier pausing
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Production URL
        run: |
          # Replace with your actual Cloudflare Pages URL after deployment
          URL="${{ secrets.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            echo "Warning: PRODUCTION_URL secret not set. Skipping ping."
            exit 0
          fi
          
          echo "Pinging $URL..."
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$URL")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Success: Received 200 OK"
          else
            echo "Error: Received status $HTTP_STATUS"
            exit 1
          fi
